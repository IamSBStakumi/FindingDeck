openapi: 3.0.3
info:
  title: FindingDeck API
  version: 0.1.0
  description: API for FindingDeck.

servers:
  - url: http://localhost:8080/v1
    description: Local development server

tags:
  - name: Projects
    description: Project management

paths:
  /projects:
    post:
      tags:
        - Projects
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - Projects
      summary: Get all projects
      operationId: getProjects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListProjectResponse"

  /projects/{projectId}:
    get:
      tags:
        - Projects
      summary: Get a project by ID
      operationId: getProjectById
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          description: Project ID
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    Project:
      type: object
      required:
        - id
        - name
        - repositoryUrl
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique identifier for the project
          example: "123e4567-e89b-12d3-a456-426614174000"
        name:
          type: string
          description: Name of the project
          example: "My Awesome Project"
        description:
          type: string
          description: Description of the project
          example: "This is a sample project for demonstration purposes."
        repositoryUrl:
          type: string
          format: uri
          description: URL of the project's repository
          example: https://github.com/example/my-awesome-project
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the project was created
          example: "2026-07-01T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the project was last updated
          example: "2026-07-02T12:00:00Z"

    CreateProjectRequest:
      type: object
      required:
        - name
        - repositoryUrl
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the project
          example: "My Awesome Project"
        description:
          type: string
          maxLength: 500
          description: Description of the project
          example: "This is a sample project for demonstration purposes."
        repositoryUrl:
          type: string
          format: uri
          description: URL of the project's repository
          example: https://github.com/example/my-awesome-project

    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: "#/components/schemas/Project"

    ListProjectResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
          example: "Invalid request"
